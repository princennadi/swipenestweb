<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SwipeNest — View Property</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #F3F4F6; color: #111827; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
    .card { background: white; border: 1px solid #E5E7EB; border-radius: 24px; padding: 40px 32px; max-width: 420px; width: 100%; text-align: center; box-shadow: 0 4px 24px rgba(0,0,0,0.06); }
    .logo { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 32px; }
    .logo-icon { width: 36px; height: 36px; background: #EFF6FF; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
    .logo-text { font-size: 18px; font-weight: 700; }
    .logo-text span { color: #2563EB; }
    .listing-card { background: linear-gradient(145deg, #2563EB, #0EA5E9); border-radius: 16px; padding: 20px; margin-bottom: 24px; text-align: left; position: relative; overflow: hidden; }
    .listing-card::before { content: '🏡'; position: absolute; font-size: 60px; top: 8px; right: 8px; opacity: 0.2; }
    .listing-badge { background: rgba(255,255,255,0.25); color: white; font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 6px; display: inline-block; margin-bottom: 8px; text-transform: uppercase; }
    .listing-title { font-size: 16px; font-weight: 700; color: white; margin-bottom: 4px; }
    .listing-location { font-size: 12px; color: rgba(255,255,255,0.8); }
    h1 { font-size: 22px; font-weight: 800; margin-bottom: 8px; }
    p { font-size: 14px; color: #6B7280; line-height: 1.6; margin-bottom: 28px; }
    .btn { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 15px; border-radius: 14px; font-size: 15px; font-weight: 600; text-decoration: none; transition: all 0.15s; margin-bottom: 10px; border: none; cursor: pointer; }
    .btn-primary { background: #1D4ED8; color: white; }
    .btn-primary:hover { background: #2563EB; }
    .btn-secondary { background: #F3F4F6; color: #374151; border: 1px solid #E5E7EB; }
    .btn-secondary:hover { background: #E5E7EB; }
    .divider { display: flex; align-items: center; gap: 12px; color: #9CA3AF; font-size: 12px; margin: 8px 0; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #E5E7EB; }
  </style>
  <script>
    window.addEventListener('load', function() {
      const match = window.location.pathname.match(/\/property\/(\d+)/);
      if (match) {
        setTimeout(function() {
          window.location.href = `swipenest://property/${match[1]}`;
        }, 500);
      }
    });
    function openInApp() {
      const match = window.location.pathname.match(/\/property\/(\d+)/);
      if (match) window.location.href = `swipenest://property/${match[1]}`;
    }
  </script>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">🏡</div>
      <div class="logo-text">Swipe<span>Nest</span></div>
    </div>
    <div class="listing-card">
      <div class="listing-badge">Property</div>
      <div class="listing-title">Someone shared a listing with you</div>
      <div class="listing-location">📍 View in SwipeNest</div>
    </div>
    <h1>Open in SwipeNest</h1>
    <p>Download SwipeNest to view this listing and thousands more verified rental properties near you.</p>
    <a href="https://apps.apple.com/app/swipenest" class="btn btn-primary">
      🍎 Download on the App Store
    </a>
    <div class="divider">already have the app?</div>
    <button class="btn btn-secondary" onclick="openInApp()">
      Open in SwipeNest
    </button>
  </div>
</body>
</html>
